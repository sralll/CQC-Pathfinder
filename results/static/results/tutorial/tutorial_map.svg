<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <!-- =========================================================
       PLACEHOLDER tutorial map (800 x 800).
       The owner replaces this file with a real orienteering map
       image (PNG/JPG/SVG). Keep the same intrinsic dimensions, or
       update `scale` in tutorial.json so the control/route
       coordinates still line up with the image.
       ========================================================= -->
  <rect width="800" height="800" fill="#f4efe6"/>
  <!-- light grid so the map looks like terrain, not a blank canvas -->
  <g stroke="#d8cfbd" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="700" x2="800" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/>
  </g>
  <!-- a couple of decorative "features" so it doesn't read as empty -->
  <ellipse cx="250" cy="350" rx="70" ry="40" fill="#cfe8c9" opacity="0.7"/>
  <ellipse cx="560" cy="300" rx="55" ry="80" fill="#cfe8c9" opacity="0.7"/>
  <path d="M120 700 Q 300 560 480 640 T 720 560" fill="none" stroke="#7fb0e0" stroke-width="6" opacity="0.8"/>
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#a99">Tutorial — Platzhalterkarte</text>
</svg>
