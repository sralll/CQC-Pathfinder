{% extends "base.html" %}
{% load static i18n %}

{% block styles %}
<link rel="stylesheet" href="{% static 'results/css/results.css' %}">
{% endblock %}

{% block scripts %}
<script defer src="{% static 'results/js/overview.js' %}"></script>
{% endblock %}

{% block nav_content %}
{% endblock %}

{% block content %}
<div id="play-wrap">

    <div id="play-container">

        <!-- Search -->
        <div id="play-header">

            <div id="play-search-wrap">
                <x-icon name="search" size="1.1rem" class="play-search-icon"></x-icon>
                <input type="text" id="play-search" placeholder="{% trans 'Search…' %}" autocomplete="off">
                <button id="play-search-clear" type="button"><x-icon name="xmark" size="1.2rem"></x-icon></button>
            </div>

            <div class="play-header-end"></div>

            <!-- Mobile sort/filter controls -->
            <div id="play-mobile-controls"></div>
        </div>

        <div id="play-loading">{% trans "Loading…" %}</div>

        <!-- Desktop table -->
        <div id="play-table-wrap">
            <table id="play-table">
                <thead id="play-thead"></thead>
                <tbody id="play-tbody"></tbody>
            </table>
        </div>

        <!-- Mobile cards -->
        <div id="play-cards"></div>

    </div>

    <!-- Filter dropdowns (positioned by JS) -->
    <div id="label-filter-dropdown"  class="play-filter-dropdown"></div>
    <div id="author-filter-dropdown" class="play-filter-dropdown"></div>
    <div id="kader-filter-dropdown"  class="play-filter-dropdown"></div>

</div>
{% endblock %}
