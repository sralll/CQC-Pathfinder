{% extends "base.html" %}
{% load static i18n %}

{% block styles %}
<link rel="stylesheet" href="{% static 'results/css/results.css' %}">
{% endblock %}

{% block scripts %}
<script defer src="{% static 'results/js/results.js' %}"></script>
{% endblock %}

{% block content %}
<div id="play-wrap">

    <div id="play-container">

        <!-- Search + mode toggle -->
        <div id="play-header">

            <!-- Mode controls (left): 3-way slider Training | Competition | Infinity -->
            <div id="play-mode-actions">
                <div class="play-3way" data-mode="competition" role="radiogroup" aria-label="{% trans 'Mode' %}">
                    <button class="play-3way-stop" data-mode="training" aria-label="{% trans 'Training' %}" title="{% trans 'Training mode' %}">
                        <x-icon name="book-open" size="14px"></x-icon>
                    </button>
                    <button class="play-3way-stop" data-mode="competition" aria-label="{% trans 'Competition' %}" title="{% trans 'Competition mode' %}">
                        <x-icon name="trophy" size="14px"></x-icon>
                    </button>
                    <button class="play-3way-stop" data-mode="infinity" aria-label="{% trans 'Infinity' %}" title="{% trans 'Infinity mode' %}">
                        <x-icon name="infinity" size="14px"></x-icon>
                    </button>
                    <div class="play-3way-thumb" id="play-mode-thumb">
                        <x-icon name="trophy" size="16px"></x-icon>
                    </div>
                </div>
            </div>

            <!-- Search (centred on desktop, fills remaining on mobile) -->
            <div id="play-search-wrap">
                <x-icon name="search" size="1.1rem" class="play-search-icon"></x-icon>
                <input type="text" id="play-search" placeholder="{% trans 'Search…' %}" autocomplete="off">
                <button id="play-search-clear" type="button"><x-icon name="xmark" size="1.2rem"></x-icon></button>
            </div>

            <!-- Right spacer — keeps search visually centred on desktop -->
            <div class="play-header-end"></div>

            <!-- Mobile sort/filter controls (below search row on mobile) -->
            <div id="play-mobile-controls"></div>
        </div>

        <div id="play-loading">{% trans "Loading…" %}</div>

        <!-- Desktop table -->
        <div id="play-table-wrap">
            <table id="play-table">
                <thead id="play-thead"></thead>
                <tbody id="play-tbody"></tbody>
            </table>
        </div>

        <!-- Mobile cards -->
        <div id="play-cards"></div>

    </div>

    <!-- Filter dropdowns (positioned by JS) -->
    <div id="label-filter-dropdown"  class="play-filter-dropdown"></div>
    <div id="author-filter-dropdown" class="play-filter-dropdown"></div>
    <div id="kader-filter-dropdown"  class="play-filter-dropdown"></div>
    <div id="status-filter-dropdown" class="play-filter-dropdown"></div>

</div>
{% endblock %}
