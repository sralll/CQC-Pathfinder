{% extends "base.html" %}
{% load static %}

{% block styles %}
<link rel="stylesheet" href="{% static 'results/css/play.css' %}">
<link rel="stylesheet" href="{% static 'results/css/infinite_play.css' %}">
{% endblock %}

{% block scripts %}
<script type="module" src="{% static 'results/js/infinite_play.js' %}"></script>
{% endblock %}

{% block content %}
<div id="play-wrap" class="rp-play-wrap"
     {% if infinity_file %}data-infinity-file-id="{{ infinity_file.id }}" data-infinity-filename="{{ infinity_file.map_file }}" data-infinity-map-scale="{{ infinity_file.map_scale }}" data-infinity-editor-scale="{{ infinity_file.scale|default_if_none:'' }}"{% endif %}>

    <!-- HUD: attempts + streak (left), last choice time (centre), report action (right) -->
    <div id="rp-hud">
        <div class="rp-hud-left">
            <div class="rp-hud-attempts" id="rp-attempts">0</div>
            <div class="rp-hud-flame" id="rp-flame">
                <x-icon name="flame" size="28px"></x-icon>
                <span class="rp-hud-streak" id="rp-streak">0</span>
            </div>
        </div>
        <div class="rp-hud-choice-time" id="rp-choice-time"></div>
        <button id="rp-report-btn" class="rp-report-btn" type="button" title="Report route" aria-label="Report route">
            <x-icon name="report-issue" size="20px"></x-icon>
        </button>
    </div>

    <!-- Map area: same DOM structure as play.html so play.css applies -->
    <div id="map-container">
        <div id="camera">
            <div id="map-scale-layer">
                <svg id="rp-svg" overflow="visible">
                    <defs>
                        <pattern id="rp-veg-stripe" width="10" height="10"
                                 patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                            <rect width="10" height="10" fill="rgb(138,255,115)"/>
                            <line x1="5" y1="0" x2="5" y2="10" stroke="rgb(74,255,23)" stroke-width="1.5"/>
                        </pattern>
                        <pattern id="rp-oob" width="8" height="8"
                                 patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                            <rect width="8" height="8" fill="rgba(255,111,166,0.18)"/>
                            <line x1="0" y1="0" x2="0" y2="8" stroke="#b04a7a" stroke-width="2"/>
                        </pattern>
                    </defs>
                    <g id="rp-camera-layer">
                        <g id="rp-rotation">
                            <g id="rp-bg-layer"></g>
                            <g id="rp-decor-layer"></g>
                            <g id="rp-obstacle-layer"></g>
                            <g id="rp-route-layer"></g>
                            <g id="rp-control-layer"></g>
                        </g>
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <!-- Action bar — same id as play mode so play.css route-btn styling applies -->
    <div id="play-stats-panel"></div>

    <div id="play-btn-bar"></div>

    <!-- Progress bar mirror of play mode (grey when re-attempting) -->
    <div id="play-progress">
        <div id="play-progress-fill"></div>
    </div>

</div>
{% endblock %}
