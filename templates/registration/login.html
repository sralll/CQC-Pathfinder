{% extends "base.html" %}
{% load static %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-overlay">
        {% if form.errors %}
        <div class="login-error">Falsche Benutzerdaten</div>
        {% endif %}

        <form class="login-form" method="post" action="">
            {% csrf_token %}

            <label class="login-field">
                <span class="login-field-label">Benutzername</span>
                <input type="text" name="username" autocomplete="username"
                       autocapitalize="off" autocorrect="off" spellcheck="false"
                       required>
            </label>

            <label class="login-field">
                <span class="login-field-label">Passwort</span>
                <div class="login-input-group">
                    <input type="password" name="password" autocomplete="current-password" required>
                    <button type="submit" class="login-submit" title="Anmelden" aria-label="Anmelden">
                        <x-icon name="sign-in" size="18px"></x-icon>
                    </button>
                </div>
            </label>
        </form>
    </div>
</div>
{% endblock %}
