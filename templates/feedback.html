{% extends "base.html" %}
{% load static %}

{% block styles %}
<style>
    .feedback-page {
        min-height: calc(100vh - 28px);
        margin-top: 28px;
        padding: 40px 16px;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }
    body.mobile .feedback-page { padding-top: 70px; }

    .feedback-card {
        width: 100%;
        max-width: 600px;
        background: var(--bg-2);
        border: 0.5px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 22px 24px;
        box-shadow: var(--shadow-card);
    }

    .feedback-title {
        margin: 0 0 14px;
        font-size: var(--font-lg);
        font-weight: 600;
        color: var(--text-strong);
    }

    .feedback-intro {
        margin: 0 0 14px;
        font-size: var(--font-md);
        color: var(--text-soft);
    }

    .feedback-success {
        margin: 0 0 16px;
        padding: 10px 12px;
        font-size: var(--font-md);
        color: var(--success);
        background: rgba(76, 175, 80, 0.10);
        border: 0.5px solid rgba(76, 175, 80, 0.40);
        border-radius: var(--radius);
    }

    .feedback-form textarea {
        width: 100%;
        box-sizing: border-box;
        min-height: 160px;
        resize: vertical;
        background: var(--bg-1);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: inherit;
        font-size: var(--font-md);
        padding: 11px 13px;
        outline: none;
        transition: border-color var(--t-med), background var(--t-med);
    }
    .feedback-form textarea:hover { border-color: var(--border-strong); }
    .feedback-form textarea:focus { border-color: var(--brand); background: var(--bg-3); }

    .feedback-submit {
        margin-top: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        background: var(--brand-gradient);
        color: var(--text-strong);
        border: none;
        border-radius: var(--radius);
        padding: 11px 22px;
        font-size: var(--font-md);
        font-weight: 600;
        cursor: pointer;
        transition: background var(--t-med), transform 0.06s;
        min-height: var(--touch-target);
    }
    .feedback-submit:hover  { background: var(--brand-gradient-h); }
    .feedback-submit:active { transform: scale(0.98); }

    body.mobile .feedback-title   { font-size: var(--font-xl); }
    body.mobile .feedback-intro   { font-size: var(--font-lg); }
    body.mobile .feedback-form textarea { font-size: var(--font-lg); padding: 14px 16px; min-height: 200px; }
    body.mobile .feedback-submit  { font-size: var(--font-lg); padding: 14px 26px; }
    body.mobile .feedback-success { font-size: var(--font-lg); padding: 13px 15px; }
</style>
{% endblock %}

{% block content %}
<div class="feedback-page">
    <div class="feedback-card">
        <h1 class="feedback-title">Feedback</h1>

        {% if success %}
        <div class="feedback-success">Merci!</div>
        {% endif %}

        <form class="feedback-form" method="post">
            {% csrf_token %}
            {{ form.comment }}
            <button type="submit" class="feedback-submit">Senden</button>
        </form>
    </div>
</div>
{% endblock %}
